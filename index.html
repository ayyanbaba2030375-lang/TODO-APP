<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TODO LIST</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background-image:url("todo.png");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:420px;
    background:rgba(255,255,255,0.85);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

#todo-input{
    width:100%;
    padding:12px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
    outline:none;
    margin-bottom:15px;
}

#todo-input:focus{
    border-color:#667eea;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#ff4757;
    color:white;
    font-size:16px;
    border-radius:10px;
    cursor:pointer;
    margin-bottom:15px;
    transition:0.3s;
}

button:hover{
    background:#e84118;
}

ul{
    list-style:none;
}

li{
    background:#f1f2f6;
    padding:12px;
    margin-bottom:10px;
    border-radius:10px;
    font-size:16px;
    color:#333;
    transition:0.3s;
}

li:hover{
    transform:translateX(5px);
    background:#dfe4ea;
}
</style>
</head>

<body>

<div class="container">
    <h2>📝 TODO LIST</h2>

    <button onclick="clearAllTodos()">Clear All</button>

    <form onsubmit="addTodo(event)">
        <input type="text" id="todo-input" placeholder="Enter a task..." >
    </form>

    <ul id="all-task"></ul>
</div>

<script>
const todoKaInput = document.querySelector("#todo-input");
const ul = document.querySelector("#all-task");

const tasks = [
  "complete weather app",
  "bike safai",
  "running",
  "namaz",
  "GYM",
  "complete video lecture",
];

function showTask() {
  ul.innerHTML = "";

  for (let i = 0; i < tasks.length; i++) {
    ul.innerHTML += `<li>${tasks[i]}
    <button onclick="deleteTodo(${i})">delete</button>
    </li>`;
  }
}
showTask();

function addTodo(event) {
  event.preventDefault();

  const task = todoKaInput.value;

  tasks.push(task);

  showTask();

  todoKaInput.value = "";
}

function deleteTodo(index) {
  tasks.splice(index, 1);

  showTask();
}

function clearAllTodos() {
  tasks.length = 0; // array ko empty karna

  showTask();
}
</script>

</body>
</html>
